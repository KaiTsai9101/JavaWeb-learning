<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素质学习辅助系统</title>
    <style>
        /* 顶部导航栏样式 */
        .navbar {
            background-color: #b5b3b3;

            /* 控制h1和超链接的样式 */
            display: flex;      /* 弹性布局 */
            justify-content: space-between;     /* 两端对齐 */
            
            padding: 10px;   /* 内边距 */
            align-items: center;     /* 垂直居中对齐 */
        }

        .navbar h1 {
            margin: 0;      /* 移除默认的外边距 */
            font-weight: bold;  /* 加粗 */
            color: white;
            font-family: "楷体";     /* 字体 */
        }

        .navbar a {
            color: white;
            text-decoration: none;      /* 去掉下划线 */
        }

        /* 搜索表单样式 */
        .search-form {
            display: flex;      /* 弹性布局 */
            flex-wrap: nowrap;      /* 不换行 */
            align-items: center;     /* 垂直居中对齐 */
            gap: 10px;      /* 控件之间的间距 */
            margin: 20px 0;
        }

        .search-form input[type="text"], .search-form select {
            padding: 5px;
            width: 260px;
        }

        .search-form button {
            padding: 5px, 15px;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;      /* 合并单元格 */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {    /* 表头 */
            background-color: #f2f2f2;
            font-weight: bold;
        }

        tr:nth-child(even){     /* 偶数行 */
            background-color: #f2f2f2;
        }

        .avatar {
            width: 50px;
            height: 50px;
        }

        /* 页脚样式 */
        footer {
            background-color: #b5b3b3;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 30px;
        }

        /* 容器样式 */
        #container { 
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>
