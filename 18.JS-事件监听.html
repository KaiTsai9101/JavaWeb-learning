<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-事件监听</title>
</head>
<body>
    <input type="button" id="btn1" value="点击我1">
    <input type="button" id="btn2" value="点击我2">

    <script>
        // 事件监听 - addEventListener (可以多次绑定同一事件)
        document.querySelector('#btn1').addEventListener('click', function(){
            alert('点击了按钮1');
        });

        // 事件监听 - 早期方式 （如果多次绑定同一事件，那么后面的会覆盖前面的）
        document.querySelector('#btn2').onclick = function(){
            alert('点击了按钮2');
        };
    </script>
</body>
</html>
