# 配置数据库连接信息
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quality
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

# Mybatis的相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名开关（数据库字段名和类属性名会根据驼峰命名匹配）
    map-underscore-to-camel-case: true