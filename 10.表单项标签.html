<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/save" method="post">
        姓名：<input type="text" name="name"><br><br>

        密码：<input type="password" name="password"><br><br>

        <!-- label标签可以快速选中文字内容 -->
        性别：<input type="radio" name="gender" value="男">男</input>
            <label><input type="radio" name="gender" value="女">女</label></input><br><br>

        爱好：<label><input type="checkbox" name="hobby" value="java">java</label>
            <label><input type="checkbox" name="hobby" value="python">python</label>
            <label><input type="checkbox" name="hobby" value="c++">c++</label><br><br>

        图像：<input type="file" name="image"><br><br>

        生日：<input type="date" name="birthday"><br><br>

        时间：<input type="time" name="time"><br><br>

        日期时间：<input type="datetime-local" name="datetime"></br></br>

        学历：<select name="degree">
            <option value="本科">本科</option>
            <option value="大专">大专</option>
            <option value="高中">高中</option>
            <option value="初中">初中</option>
            <option value="小学">小学</option>
        </select><br><br>

        描述：<textarea name="description" cols="30" rows="10"></textarea><br><br>

        <input type="hidden" name="id" value="1001">

        <!-- 表单常见按钮 -->
         <input type="submit" value="提交"></input>
         <input type="reset" value="重置"></input>
         <input type="button" value="按钮"></input>
         <br>
    </form>
</body>
</html>
