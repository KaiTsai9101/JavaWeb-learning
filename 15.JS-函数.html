<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-函数</title>
</head>
<body>
    

    <script>
        // 具名函数
        function add1(a, b){
            return a + b;
        }

        let result = add1(1, 2);
        console.log(result);

        // 匿名函数
        let add2 = function(a, b){
            return a + b;
        }
        console.log(add2(1, 2));

        let add3 = (a, b) => a + b;
        console.log(add3(1, 2));
    </script>
</body>
</html>
