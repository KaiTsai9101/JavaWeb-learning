<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能学习辅助系统</title>
    <style>
        /* 样式 */
        .navbar {
            background-color: #808080;

            /* 控制h1和超链接的样式 */
            display: flex;      /* 弹性布局 */
            justify-content: space-between;     /* 两端对齐 */
            
            padding: 10px;   /* 内边距 */
            align-items: center;     /* 垂直居中对齐 */
        }

        .navbar h1 {
            margin: 0;      /* 移除默认的外边距 */
            font-weight: bold;  /* 加粗 */
            color: white;
            font-family: "楷体";     /* 字体 */
        }

        .navbar a {
            color: white;
            text-decoration: none;      /* 去掉下划线 */
        }

    </style>
</head>
<body>
    <div class="navbar">
        <h1 >智能学习辅助系统</h1>
        <a href="#">退出登录</a>
    </div>
</body>
</html>
