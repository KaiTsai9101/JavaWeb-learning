<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-DOM</title>
</head>
<body>
    
    <h1 id="title1">11111</h1>
    <h1>22222</h1>
    <h1>33333</h1>

    <script>
        // 1.修改第一个h1的内容
        // 1.1 获取DOM对象
        // let h1 = document.querySelector('#title1');  // 获取第一个h1标签
        let h1 = document.querySelector('h1');  // 获取第一个h1标签

        let h1s = document.querySelectorAll('h1');  // 获取所有h1标签

        // 1.2 修改DOM对象
        h1.innerHTML = '修改后的内容';  // 修改h1标签的内容
        h1s[0].innerHTML = '修改后的内容';  // 修改第一个h1标签的内容（数组索引从0开始）
        
    </script>
</body>
</html>
