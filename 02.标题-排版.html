<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title的位置在浏览器的标题栏</title>
</head>
<body>
    <!-- 定义一个标题，标题内容：标题 -->

    <a href="https://www.bilibili.com/" target="_blank">b站</a>
    2016/5/1
</body>
</html>
